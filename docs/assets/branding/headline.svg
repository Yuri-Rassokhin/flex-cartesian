<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 950 100" width="100%">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f0f8ff" />
      <stop offset="45%" stop-color="#6ce5ff" />
      <stop offset="100%" stop-color="#c8bcff" />
    </linearGradient>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@800&amp;display=swap');
      .headline {
        font-family: 'Inter', system-ui, sans-serif;
        font-size: 42px;
        font-weight: 800;
        letter-spacing: -0.05em;
      }
      .white { fill: #edf5ff; }
      .gradient { fill: url(#grad); }
    </style>
  </defs>
  <rect width="100%" height="100%" fill="#07111f" rx="16" />
  <text x="50%" y="50%" dy="0.35em" text-anchor="middle" class="headline">
    <tspan class="white">Explore</tspan>
    <tspan class="gradient"> real systems as functions of parameters.</tspan>
  </text>
</svg>

