<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Surface Plot</title>
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <style>
    html, body {
      background-color: transparent !important;
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      font-family: Arial, sans-serif;
    }
    #chart {
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>
<body>
  <div id="chart"></div>
  <script>
    const data = [{"type":"surface","name":"time","x":[64,512,1400,1500,4096,8192],"y":["dynamodb.af-south-1.amazonaws.com","dynamodb.ap-northeast-1.amazonaws.com","dynamodb.eu-central-1.amazonaws.com","dynamodb.sa-east-1.amazonaws.com","dynamodb.us-east-1.amazonaws.com"],"z":[[180.812,181.878,182.547,"nil","nil","nil"],[154.287,154.377,147.298,"nil","nil","nil"],[114.471,115.582,116.035,"nil","nil","nil"],[306.991,305.082,302.871,"nil","nil","nil"],[197.083,190.582,191.175,"nil","nil","nil"]],"opacity":0.85,"hovertemplate":"size: %{x}<br>target: %{y}<br>time: %{z}<extra></extra>","connectgaps":false,"showscale":false,"colorscale":"Bluered","contours":{"x":{"show":true,"color":"#ffffff","width":1},"y":{"show":true,"color":"#ffffff","width":1}}},{"type":"surface","name":"cap","x":[64,512,1400,1500,4096,8192],"y":["dynamodb.af-south-1.amazonaws.com","dynamodb.ap-northeast-1.amazonaws.com","dynamodb.eu-central-1.amazonaws.com","dynamodb.sa-east-1.amazonaws.com","dynamodb.us-east-1.amazonaws.com"],"z":[[150,150,150,150,150,150],[150,150,150,150,150,150],[150,150,150,150,150,150],[150,150,150,150,150,150],[150,150,150,150,150,150]],"opacity":0.85,"hovertemplate":"size: %{x}<br>target: %{y}<br>cap: %{z}<extra></extra>","connectgaps":false,"showscale":false,"colorscale":"Bluered","contours":{"x":{"show":true,"color":"#ffffff","width":1},"y":{"show":true,"color":"#ffffff","width":1}}}];

    const layout = {
      title: '',
      paper_bgcolor: 'rgba(0,0,0,0)',
      plot_bgcolor: 'rgba(0,0,0,0)',
      font: { color: '#333333' }, // Применяется ко всему тексту (заголовок, названия осей, значения)
      scene: {
      aspectmode: 'cube',
        xaxis: {
          title: "size",
          showgrid: true,
          zeroline: true,
          gridcolor: 'rgba(0,0,0,0.15)', // Цвет линий сетки
          zerolinecolor: 'rgba(0,0,0,0.15)', // Цвет нулевой линии
          linecolor: 'rgba(0,0,0,0.15)', // Цвет линии самой оси
          rangemode: 'tozero',
        },
        yaxis: {
          title: "target",
          showgrid: true,
          zeroline: true,
          gridcolor: 'rgba(0,0,0,0.15)',
          zerolinecolor: 'rgba(0,0,0,0.15)',
          linecolor: 'rgba(0,0,0,0.15)',
          rangemode: 'tozero',
        },
        zaxis: {
          title: "time, cap",
          showgrid: true,
          zeroline: true,
          gridcolor: 'rgba(0,0,0,0.15)',
          zerolinecolor: 'rgba(0,0,0,0.15)',
          linecolor: 'rgba(0,0,0,0.15)',
          rangemode: 'tozero',
        }
      },
      margin: { l: 0, r: 0, b: 0, t: 50 }
    };

    Plotly.newPlot("chart", data, layout, { responsive: true });
  </script>
</body>
</html>
